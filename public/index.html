<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HDNet - Manutenção</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .card-dash { transition: 0.3s; }
    .card-dash:hover { transform: translateY(-5px); }
  </style>
</head>
<body>
  <div class="container mt-4">
    <h2 class="text-center">🔧 HDNet - Sistema de Manutenção</h2>
    <hr>

    <div class="row mb-4" id="dashboard">
      <div class="col-md-4">
        <div class="card text-white bg-danger card-dash">
          <div class="card-body">
            <h5>OS Abertas</h5>
            <h3 id="osAbertas">-</h3>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-white bg-success card-dash">
          <div class="card-body">
            <h5>Clientes</h5>
            <h3 id="totalClientes">-</h3>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-white bg-info card-dash">
          <div class="card-body">
            <h5>Técnicos</h5>
            <h3 id="totalTecnicos">-</h3>
          </div>
        </div>
      </div>
    </div>

    <!-- Navegação -->
    <ul class="nav nav-tabs mb-3" id="myTab" role="tablist">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#clientes">Clientes</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tecnicos">Técnicos</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#os">Ordens de Serviço</button></li>
    </ul>

    <div class="tab-content">
      <!-- Aba Clientes -->
      <div class="tab-pane fade show active" id="clientes">
        <button class="btn btn-primary mb-2" onclick="abrirModalCliente()">+ Novo Cliente</button>
        <table class="table table-bordered" id="tabelaClientes">
          <thead class="table-dark"><tr><th>ID</th><th>Nome</th><th>Telefone</th><th>Endereço</th><th>Plano</th><th>Ações</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- Aba Técnicos -->
      <div class="tab-pane fade" id="tecnicos">
        <button class="btn btn-primary mb-2" onclick="abrirModalTecnico()">+ Novo Técnico</button>
        <table class="table table-bordered" id="tabelaTecnicos">
          <thead class="table-dark"><tr><th>ID</th><th>Nome</th><th>Telefone</th><th>Especialidade</th><th>Ações</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- Aba Ordens de Serviço -->
      <div class="tab-pane fade" id="os">
        <button class="btn btn-primary mb-2" onclick="abrirModalOS()">+ Nova OS</button>
        <table class="table table-bordered" id="tabelaOS">
          <thead class="table-dark"><tr><th>ID</th><th>Cliente</th><th>Técnico</th><th>Tipo</th><th>Problema</th><th>Status</th><th>Ações</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal genérico (usado para formulários) -->
  <div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title" id="modalTitle"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
