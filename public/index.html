<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDNet Pro - Painel de Controle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @media print { .no-print { display: none; } }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tab-btn.active { background-color: #0f172a; color: white; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans leading-tight">

<div id="app">
    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-40 shadow-md no-print">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 w-8 h-8 rounded-lg flex items-center justify-center">
                    <i class="fas fa-wifi text-white text-sm"></i>
                </div>
                <h1 class="text-lg font-black tracking-tighter uppercase">HDNET PRO</h1>
            </div>
            <div id="auth-status" class="flex items-center gap-4 text-sm"></div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        <div id="admin-view" class="fade-in">
            <!-- Cards Dashboard -->
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mb-8">
                <div class="bg-white p-5 rounded-2xl border-l-4 border-red-500 shadow-sm flex justify-between items-center">
                    <div><p class="text-slate-400 text-[10px] font-bold uppercase tracking-wider">OS Pendentes</p><h3 id="stat-os" class="text-3xl font-black">0</h3></div>
                    <div class="text-red-500 opacity-20 text-3xl"><i class="fas fa-tools"></i></div>
                </div>
                <div class="bg-white p-5 rounded-2xl border-l-4 border-blue-500 shadow-sm flex justify-between items-center">
                    <div><p class="text-slate-400 text-[10px] font-bold uppercase tracking-wider">Clientes Base</p><h3 id="stat-clientes" class="text-3xl font-black">0</h3></div>
                    <div class="text-blue-500 opacity-20 text-3xl"><i class="fas fa-user-friends"></i></div>
                </div>
                <div class="bg-white p-5 rounded-2xl border-l-4 border-emerald-500 shadow-sm flex justify-between items-center">
                    <div><p class="text-slate-400 text-[10px] font-bold uppercase tracking-wider">Técnicos Ativos</p><h3 id="stat-tecnicos" class="text-3xl font-black">0</h3></div>
                    <div class="text-emerald-500 opacity-20 text-3xl"><i class="fas fa-user-shield"></i></div>
                </div>
            </div>

            <!-- Abas e Botões -->
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
                <div class="flex bg-white p-1 rounded-xl shadow-sm border border-slate-200 w-full md:w-auto">
                    <button onclick="switchTab('os')" class="tab-btn active px-5 py-2 rounded-lg text-xs font-bold uppercase transition-all flex items-center gap-2"><i class="fas fa-file-invoice"></i> Ordens</button>
                    <button onclick="switchTab('clientes')" class="tab-btn px-5 py-2 rounded-lg text-xs font-bold uppercase transition-all flex items-center gap-2"><i class="fas fa-address-book"></i> Clientes</button>
                    <button onclick="switchTab('tecnicos')" class="tab-btn px-5 py-2 rounded-lg text-xs font-bold uppercase transition-all flex items-center gap-2"><i class="fas fa-hard-hat"></i> Equipe</button>
                </div>
                <div class="relative w-full md:w-80">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="text" id="main-search" placeholder="Filtrar registros..." class="w-full pl-12 pr-4 py-3 bg-white rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
                </div>
            </div>

            <!-- Área de conteúdo dinâmico -->
            <div id="tab-content" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden min-h-[300px]"></div>
        </div>
    </main>
</div>

<!-- Modal -->
<div id="modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm">
    <div class="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center">
            <h3 id="modal-title" class="font-black text-slate-800 uppercase tracking-tight">Formulário</h3>
            <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 transition-colors"><i class="fas fa-times-circle text-xl"></i></button>
        </div>
        <div id="modal-body" class="p-6"></div>
    </div>
</div>

<script>
    // Estado global
    let clientes = [], tecnicos = [], ordens = [];
    let activeTab = 'os';
    let searchTerm = '';

    // API Base URL (sua função Netlify)
    const API_BASE = '/api';

    // Carregar dados do backend
    async function fetchData() {
        try {
            const [clientesRes, tecnicosRes, ordensRes] = await Promise.all([
                fetch(`${API_BASE}/clientes`),
                fetch(`${API_BASE}/tecnicos`),
                fetch(`${API_BASE}/ordens`)
            ]);
            clientes = await clientesRes.json();
            tecnicos = await tecnicosRes.json();
            ordens = await ordensRes.json();
            updateStats();
            render();
        } catch (err) {
            console.error('Erro ao carregar dados:', err);
            alert('Erro ao conectar com o servidor. Verifique se as funções Netlify estão rodando.');
        }
    }

    function updateStats() {
        const pendentes = ordens.filter(o => o.status !== 'concluida').length;
        document.getElementById('stat-os').innerText = pendentes;
        document.getElementById('stat-clientes').innerText = clientes.length;
        document.getElementById('stat-tecnicos').innerText = tecnicos.length;
    }

    function render() {
        const container = document.getElementById('tab-content');
        let html = `<div class="p-4 border-b bg-slate-50/50 flex justify-between items-center"><span class="text-xs font-black text-slate-400 uppercase tracking-widest">${activeTab}</span><button onclick="openForm()" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-xs font-bold"><i class="fas fa-plus mr-1"></i> NOVO</button></div>`;

        if (activeTab === 'os') {
            let filtered = ordens.filter(o => 
                (clientes.find(c => c.id === o.cliente_id)?.nome || '').toLowerCase().includes(searchTerm) ||
                (tecnicos.find(t => t.id === o.tecnico_id)?.nome || '').toLowerCase().includes(searchTerm) ||
                o.tipo?.toLowerCase().includes(searchTerm) || o.status?.toLowerCase().includes(searchTerm)
            );
            html += `<div class="overflow-x-auto"><table class="w-full"><thead class="bg-slate-50 text-[10px] text-slate-400 font-bold uppercase border-b"><tr><th class="p-4 text-left">Cliente</th><th class="p-4 text-left">Técnico</th><th class="p-4 text-left">Tipo</th><th class="p-4 text-left">Problema</th><th class="p-4 text-center">Status</th><th class="p-4 text-center">Ações</th></tr></thead><tbody class="divide-y divide-slate-100">`;
            filtered.forEach(os => {
                const cliente = clientes.find(c => c.id === os.cliente_id);
                const tecnico = tecnicos.find(t => t.id === os.tecnico_id);
                let statusClass = os.status === 'aberta' ? 'bg-red-100 text-red-700' : (os.status === 'em andamento' ? 'bg-yellow-100 text-yellow-700' : 'bg-green-100 text-green-700');
                html += `<tr><td class="p-4 font-bold text-sm">${cliente?.nome || '??'}</td><td class="p-4 text-xs font-medium text-slate-600">${tecnico?.nome || 'Pendente'}</td><td class="p-4 text-sm">${os.tipo || '-'}</td><td class="p-4 text-sm">${os.problema || '-'}</td><td class="p-4 text-center"><span class="px-2 py-1 rounded-full text-xs font-bold ${statusClass}">${os.status === 'aberta' ? 'Aberta' : (os.status === 'em andamento' ? 'Em andamento' : 'Concluída')}</span></td><td class="p-4 text-center space-x-2">`;
                if (os.status !== 'concluida') {
                    html += `<button onclick="finishOS(${os.id})" class="text-green-600 hover:text-green-800"><i class="fas fa-check-circle"></i></button> `;
                }
                html += `<button onclick="editOS(${os.id})" class="text-blue-600 hover:text-blue-800"><i class="fas fa-edit"></i></button> <button onclick="deleteEntry('ordens', ${os.id})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash-alt"></i></button></td></tr>`;
            });
            html += `</tbody></table></div>`;
        } else if (activeTab === 'clientes') {
            let filtered = clientes.filter(c => c.nome.toLowerCase().includes(searchTerm) || c.telefone.toLowerCase().includes(searchTerm));
            html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4">`;
            filtered.forEach(c => {
                html += `<div class="border rounded-xl p-4 flex justify-between items-center"><div><p class="font-bold text-slate-700">${c.nome}</p><p class="text-xs text-slate-500">${c.telefone || '-'}</p><p class="text-xs text-slate-500">${c.endereco || '-'}</p><p class="text-xs text-slate-500">Plano: ${c.plano || '-'}</p></div><button onclick="deleteEntry('clientes', ${c.id})" class="text-red-400 hover:text-red-600"><i class="fas fa-trash-alt"></i></button></div>`;
            });
            html += `</div>`;
        } else {
            let filtered = tecnicos.filter(t => t.nome.toLowerCase().includes(searchTerm) || t.especialidade.toLowerCase().includes(searchTerm));
            html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4">`;
            filtered.forEach(t => {
                html += `<div class="border rounded-xl p-4 flex justify-between items-center"><div><p class="font-bold text-slate-700">${t.nome}</p><p class="text-xs text-slate-500">${t.telefone || '-'}</p><p class="text-xs text-slate-500">Especialidade: ${t.especialidade || '-'}</p></div><button onclick="deleteEntry('tecnicos', ${t.id})" class="text-red-400 hover:text-red-600"><i class="fas fa-trash-alt"></i></button></div>`;
            });
            html += `</div>`;
        }
        container.innerHTML = html;
    }

    async function finishOS(id) {
        const os = ordens.find(o => o.id === id);
        if (os && os.status !== 'concluida') {
            await fetch(`${API_BASE}/ordens?id=${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...os, status: 'concluida', concluida_em: new Date().toISOString() })
            });
            await fetchData();
        }
    }

    async function deleteEntry(type, id) {
        if (!confirm('Tem certeza que deseja excluir permanentemente?')) return;
        await fetch(`${API_BASE}/${type}?id=${id}`, { method: 'DELETE' });
        await fetchData();
    }

    function openForm(editId = null) {
        const isEdit = editId !== null;
        let title = '';
        let fields = '';
        if (activeTab === 'clientes') {
            title = isEdit ? 'Editar Cliente' : 'Novo Cliente';
            const cliente = isEdit ? clientes.find(c => c.id === editId) : null;
            fields = `
                <input name="nome" placeholder="Nome" class="w-full p-4 border rounded-xl mb-3" value="${cliente?.nome || ''}" required>
                <input name="telefone" placeholder="Telefone" class="w-full p-4 border rounded-xl mb-3" value="${cliente?.telefone || ''}">
                <textarea name="endereco" placeholder="Endereço" class="w-full p-4 border rounded-xl mb-3">${cliente?.endereco || ''}</textarea>
                <input name="plano" placeholder="Plano" class="w-full p-4 border rounded-xl mb-3" value="${cliente?.plano || ''}">
                <input name="mac_roteador" placeholder="MAC Roteador" class="w-full p-4 border rounded-xl mb-3" value="${cliente?.mac_roteador || ''}">
            `;
        } else if (activeTab === 'tecnicos') {
            title = isEdit ? 'Editar Técnico' : 'Novo Técnico';
            const tecnico = isEdit ? tecnicos.find(t => t.id === editId) : null;
            fields = `
                <input name="nome" placeholder="Nome" class="w-full p-4 border rounded-xl mb-3" value="${tecnico?.nome || ''}" required>
                <input name="telefone" placeholder="Telefone" class="w-full p-4 border rounded-xl mb-3" value="${tecnico?.telefone || ''}">
                <input name="especialidade" placeholder="Especialidade" class="w-full p-4 border rounded-xl mb-3" value="${tecnico?.especialidade || ''}">
            `;
        } else {
            title = isEdit ? 'Editar OS' : 'Nova OS';
            const os = isEdit ? ordens.find(o => o.id === editId) : null;
            fields = `
                <select name="cliente_id" class="w-full p-4 border rounded-xl mb-3" required>
                    <option value="">Cliente...</option>
                    ${clientes.map(c => `<option value="${c.id}" ${os && os.cliente_id === c.id ? 'selected' : ''}>${c.nome}</option>`).join('')}
                </select>
                <select name="tecnico_id" class="w-full p-4 border rounded-xl mb-3" required>
                    <option value="">Técnico...</option>
                    ${tecnicos.map(t => `<option value="${t.id}" ${os && os.tecnico_id === t.id ? 'selected' : ''}>${t.nome}</option>`).join('')}
                </select>
                <select name="tipo" class="w-full p-4 border rounded-xl mb-3">
                    <option value="Manutenção" ${os && os.tipo === 'Manutenção' ? 'selected' : ''}>Manutenção</option>
                    <option value="Instalação" ${os && os.tipo === 'Instalação' ? 'selected' : ''}>Instalação</option>
                    <option value="Emergencial" ${os && os.tipo === 'Emergencial' ? 'selected' : ''}>Emergencial</option>
                </select>
                <textarea name="problema" placeholder="Descrição do problema" class="w-full p-4 border rounded-xl mb-3">${os?.problema || ''}</textarea>
                <select name="status" class="w-full p-4 border rounded-xl mb-3">
                    <option value="aberta" ${os && os.status === 'aberta' ? 'selected' : ''}>Aberta</option>
                    <option value="em andamento" ${os && os.status === 'em andamento' ? 'selected' : ''}>Em andamento</option>
                    <option value="concluida" ${os && os.status === 'concluida' ? 'selected' : ''}>Concluída</option>
                </select>
            `;
        }
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-body').innerHTML = `<form id="modal-form" class="space-y-4">${fields}<button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">SALVAR</button></form>`;
        const form = document.getElementById('modal-form');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const formData = Object.fromEntries(new FormData(form));
            if (activeTab === 'clientes') {
                if (isEdit) {
                    await fetch(`${API_BASE}/clientes?id=${editId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(formData) });
                } else {
                    await fetch(`${API_BASE}/clientes`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(formData) });
                }
            } else if (activeTab === 'tecnicos') {
                if (isEdit) {
                    await fetch(`${API_BASE}/tecnicos?id=${editId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(formData) });
                } else {
                    await fetch(`${API_BASE}/tecnicos`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(formData) });
                }
            } else {
                if (isEdit) {
                    await fetch(`${API_BASE}/ordens?id=${editId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(formData) });
                } else {
                    await fetch(`${API_BASE}/ordens`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(formData) });
                }
            }
            closeModal();
            await fetchData();
        };
        document.getElementById('modal').classList.remove('hidden');
    }

    function editOS(id) { openForm(id); }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    function switchTab(tab) { activeTab = tab; document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active')); event.target.classList.add('active'); render(); }

    document.getElementById('main-search').addEventListener('input', (e) => { searchTerm = e.target.value.toLowerCase(); render(); });
    window.switchTab = switchTab; window.openForm = openForm; window.editOS = editOS; window.finishOS = finishOS; window.deleteEntry = deleteEntry; window.closeModal = closeModal;

    fetchData();
</script>
</body>
</html>
