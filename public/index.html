<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HDNet | Gestão Compartilhada</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <style>.tab-active { background-color: #0f172a !important; color: white !important; }</style>
</head>
<body class="bg-slate-100">

<div class="max-w-7xl mx-auto p-4 md:p-6">
  <div class="flex flex-wrap justify-between items-center mb-6">
    <div class="flex items-center gap-3">
      <div class="bg-blue-600 w-9 h-9 rounded-xl flex items-center justify-center"><i class="fas fa-wifi text-white"></i></div>
      <h1 class="text-2xl font-black uppercase text-slate-800">HDNET PRO</h1>
    </div>
    <div class="flex gap-2">
      <button onclick="window.setView('admin')" class="bg-slate-700 text-white px-4 py-2 rounded-xl text-sm font-bold">Admin</button>
      <button onclick="window.abrirLoginTecnico()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold">Sou Técnico</button>
    </div>
  </div>

  <div id="adminDashboard" class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
    <div class="bg-white p-5 rounded-2xl border-l-8 border-amber-500"><p class="text-slate-400 text-xs uppercase">OS Pendentes</p><h3 id="stat-os" class="text-3xl font-black">0</h3></div>
    <div class="bg-white p-5 rounded-2xl border-l-8 border-blue-500"><p class="text-slate-400 text-xs uppercase">Clientes</p><h3 id="stat-clientes" class="text-3xl font-black">0</h3></div>
    <div class="bg-white p-5 rounded-2xl border-l-8 border-emerald-500"><p class="text-slate-400 text-xs uppercase">Técnicos</p><h3 id="stat-tecnicos" class="text-3xl font-black">0</h3></div>
  </div>

  <div id="adminView">
    <div class="flex flex-col md:flex-row justify-between gap-4 mb-6">
      <div class="flex gap-2 bg-white p-1 rounded-2xl">
        <button onclick="window.setActiveTab('os')" id="tab-os" class="tab-btn px-5 py-2 rounded-xl text-xs font-bold uppercase flex items-center gap-2">📋 Ordens</button>
        <button onclick="window.setActiveTab('clientes')" id="tab-clientes" class="tab-btn px-5 py-2 rounded-xl text-xs font-bold uppercase flex items-center gap-2">👥 Clientes</button>
        <button onclick="window.setActiveTab('tecnicos')" id="tab-tecnicos" class="tab-btn px-5 py-2 rounded-xl text-xs font-bold uppercase flex items-center gap-2">🔧 Equipe</button>
      </div>
      <input type="text" id="searchInput" placeholder="Filtrar..." class="w-full md:w-80 p-3 bg-white rounded-2xl border shadow-sm">
    </div>
    <div id="adminContent" class="bg-white rounded-2xl shadow-md border overflow-hidden"></div>
  </div>

  <div id="tecnicoView" class="hidden">
    <div class="bg-white rounded-2xl shadow-md p-5">
      <h2 class="text-xl font-black">🔧 Minhas Ordens</h2>
      <p id="tecInfo" class="text-sm text-slate-500 mb-4"></p>
      <div id="tecOSList" class="space-y-4"></div>
      <button onclick="window.setView('admin')" class="mt-4 bg-slate-600 text-white px-4 py-2 rounded-xl">← Voltar</button>
    </div>
  </div>
</div>

<div id="modal" class="fixed inset-0 hidden items-center justify-center bg-slate-900/80 z-50">
  <div class="bg-white rounded-3xl w-full max-w-md p-6">
    <div class="flex justify-between items-center mb-4">
      <h3 id="modal-title" class="font-black">Título</h3>
      <button onclick="window.fecharModal()" class="text-red-500"><i class="fas fa-times text-xl"></i></button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  // 🔁 ALTERE A LINHA ABAIXO PELA URL DO SEU BACKEND NO RENDER
  const API_BASE = 'https://hdnet-api.onrender.com/api';   // <--- COLOQUE A SUA AQUI

  let clientes = [], tecnicos = [], ordens = [];
  let activeTab = 'os', searchTerm = '', currentView = 'admin', tecnicoLogado = null;

  async function carregarDados() {
    try {
      const [resCli, resTec, resOrd] = await Promise.all([
        fetch(`${API_BASE}/clientes`),
        fetch(`${API_BASE}/tecnicos`),
        fetch(`${API_BASE}/ordens`)
      ]);
      if (!resCli.ok || !resTec.ok || !resOrd.ok) throw new Error('Erro na resposta');
      clientes = await resCli.json();
      tecnicos = await resTec.json();
      ordens = await resOrd.json();
      atualizarDashboard();
      if (currentView === 'admin') renderAdminContent();
      else if (currentView === 'tecnico' && tecnicoLogado) renderTecnicoView();
    } catch (err) { console.error(err); alert('Erro ao carregar dados da API. Verifique se o backend está rodando.'); }
  }

  async function salvarCliente(dados, id = null) {
    const url = id ? `${API_BASE}/clientes?id=${id}` : `${API_BASE}/clientes`;
    const method = id ? 'PUT' : 'POST';
    await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dados) });
    await carregarDados();
  }
  async function excluirCliente(id) {
    if (ordens.some(o => o.cliente_id === id)) return alert("Cliente possui ordens.");
    if (confirm("Excluir?")) {
      await fetch(`${API_BASE}/clientes?id=${id}`, { method: 'DELETE' });
      await carregarDados();
    }
  }
  async function salvarTecnico(dados, id = null) {
    const url = id ? `${API_BASE}/tecnicos?id=${id}` : `${API_BASE}/tecnicos`;
    const method = id ? 'PUT' : 'POST';
    await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dados) });
    await carregarDados();
  }
  async function excluirTecnico(id) {
    if (ordens.some(o => o.tecnico_id === id)) return alert("Técnico possui ordens.");
    if (confirm("Excluir?")) {
      await fetch(`${API_BASE}/tecnicos?id=${id}`, { method: 'DELETE' });
      await carregarDados();
    }
  }
  async function salvarOS(dados, id = null) {
    const url = id ? `${API_BASE}/ordens?id=${id}` : `${API_BASE}/ordens`;
    const method = id ? 'PUT' : 'POST';
    await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dados) });
    await carregarDados();
  }
  async function excluirOS(id) {
    if (confirm("Excluir OS?")) {
      await fetch(`${API_BASE}/ordens?id=${id}`, { method: 'DELETE' });
      await carregarDados();
    }
  }
  async function concluirOS(id) {
    const os = ordens.find(o => o.id === id);
    if (os && os.status !== 'concluida') {
      await salvarOS({ ...os, status: 'concluida' }, id);
      alert('✅ OS concluída!');
    }
  }
  function atualizarDashboard() {
    document.getElementById('stat-os').innerText = ordens.filter(o => o.status !== 'concluida').length;
    document.getElementById('stat-clientes').innerText = clientes.length;
    document.getElementById('stat-tecnicos').innerText = tecnicos.length;
  }

  // RENDER ADMIN
  function renderAdminContent() {
    const container = document.getElementById('adminContent');
    if (activeTab === 'clientes') {
      const filtered = clientes.filter(c => c.nome.toLowerCase().includes(searchTerm));
      let html = `<div class="p-4 border-b flex justify-between"><span class="font-bold">CLIENTES (${filtered.length})</span><button onclick="window.abrirFormCliente()" class="bg-blue-600 text-white px-3 py-1 rounded-xl text-xs">+ NOVO</button></div>`;
      if (!filtered.length) html += `<div class="p-8 text-center">Nenhum cliente</div>`;
      else {
        html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4">`;
        filtered.forEach(c => {
          html += `<div class="border rounded-2xl p-4 flex justify-between items-start"><div><p class="font-bold">${escapeHtml(c.nome)}</p><p class="text-sm">${escapeHtml(c.telefone || '-')}<br>${escapeHtml(c.endereco || '-')}</p></div><button onclick="window.excluirCliente(${c.id})" class="text-red-500"><i class="fas fa-trash"></i></button></div>`;
        });
        html += `</div>`;
      }
      container.innerHTML = html;
    } else if (activeTab === 'tecnicos') {
      const filtered = tecnicos.filter(t => t.nome.toLowerCase().includes(searchTerm));
      let html = `<div class="p-4 border-b flex justify-between"><span class="font-bold">TÉCNICOS (${filtered.length})</span><button onclick="window.abrirFormTecnico()" class="bg-blue-600 text-white px-3 py-1 rounded-xl text-xs">+ NOVO</button></div>`;
      if (!filtered.length) html += `<div class="p-8 text-center">Nenhum técnico</div>`;
      else {
        html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4">`;
        filtered.forEach(t => {
          html += `<div class="border rounded-2xl p-4 flex justify-between items-center"><div><p class="font-bold">${escapeHtml(t.nome)}</p><p class="text-sm">${escapeHtml(t.especialidade || 'Geral')}</p></div><button onclick="window.excluirTecnico(${t.id})" class="text-red-500"><i class="fas fa-trash"></i></button></div>`;
        });
        html += `</div>`;
      }
      container.innerHTML = html;
    } else {
      const filtered = ordens.filter(o => {
        const cli = clientes.find(c => c.id === o.cliente_id);
        const tec = tecnicos.find(t => t.id === o.tecnico_id);
        return (cli?.nome || '').toLowerCase().includes(searchTerm) || (tec?.nome || '').toLowerCase().includes(searchTerm);
      });
      let html = `<div class="p-4 border-b flex justify-between flex-wrap gap-2"><span class="font-bold">ORDENS (${filtered.length})</span><div class="flex gap-2"><button onclick="window.gerarPDFOrdens()" class="bg-emerald-600 text-white px-3 py-1 rounded-xl text-xs">PDF</button><button onclick="window.abrirFormOS()" class="bg-blue-600 text-white px-3 py-1 rounded-xl text-xs">+ NOVA OS</button></div></div>`;
      if (!filtered.length) html += `<div class="p-8 text-center">Nenhuma ordem</div>`;
      else {
        html += `<div class="overflow-x-auto"><table class="w-full"><thead class="bg-slate-100"></td><th class="p-4">Cliente</th><th>Técnico</th><th>Tipo/Problema</th><th>Status</th><th class="text-center">Ações</th></tr></thead><tbody>`;
        filtered.forEach(o => {
          const cli = clientes.find(c => c.id === o.cliente_id);
          const tec = tecnicos.find(t => t.id === o.tecnico_id);
          const statusText = { aberta: 'Aberta', 'em andamento': 'Em andamento', concluida: 'Concluída' }[o.status];
          html += `<tr><td class="p-4"><b>${escapeHtml(cli?.nome || 'Removido')}</b><br><span class="text-xs">${escapeHtml(cli?.endereco || '')}</span></td><td>${escapeHtml(tec?.nome || 'N/A')}</td><td><span class="bg-slate-200 px-2 py-0.5 rounded text-xs">${o.tipo}</span><p class="text-sm">${escapeHtml(o.problema || '-')}</p></td><td><span class="px-2 py-1 rounded-lg text-xs bg-amber-100">${statusText}</span></td><td class="text-right">${o.status !== 'concluida' ? `<button onclick="window.concluirOS(${o.id})" class="text-emerald-600 p-1"><i class="fas fa-check-circle"></i></button>` : ''}<button onclick="window.editarOS(${o.id})" class="text-blue-600 p-1"><i class="fas fa-edit"></i></button><button onclick="window.excluirOS(${o.id})" class="text-red-500 p-1"><i class="fas fa-trash"></i></button></td></tr>`;
        });
        html += `</tbody></table></div>`;
      }
      container.innerHTML = html;
    }
  }

  function renderTecnicoView() {
    const minhas = ordens.filter(o => o.tecnico_id === tecnicoLogado.id);
    document.getElementById('tecInfo').innerHTML = `${escapeHtml(tecnicoLogado.nome)} - ${escapeHtml(tecnicoLogado.especialidade || 'Técnico')}`;
    const container = document.getElementById('tecOSList');
    if (!minhas.length) { container.innerHTML = '<div class="text-center p-8">Nenhuma ordem</div>'; return; }
    let html = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
    minhas.forEach(o => {
      const cli = clientes.find(c => c.id === o.cliente_id);
      const statusText = { aberta: 'Aberta', 'em andamento': 'Em andamento', concluida: 'Concluída' }[o.status];
      html += `<div class="border p-4 rounded-2xl"><div class="flex justify-between"><div><b>${escapeHtml(cli?.nome || 'Removido')}</b><br><span class="text-sm">${escapeHtml(cli?.endereco || '')}</span></div><span class="text-xs bg-slate-100 px-2 py-1 rounded">${statusText}</span></div><p class="mt-2"><b>Problema:</b> ${escapeHtml(o.problema || '-')}</p>${o.status !== 'concluida' ? `<button onclick="window.finalizarOS(${o.id})" class="mt-3 w-full bg-emerald-600 text-white py-2 rounded-xl">FINALIZAR</button>` : `<button disabled class="mt-3 w-full bg-slate-300 text-slate-500 py-2 rounded-xl">CONCLUÍDA</button>`}</div>`;
    });
    html += `</div>`;
    container.innerHTML = html;
  }

  async function finalizarOS(id) {
    const os = ordens.find(o => o.id === id);
    if (os && os.status !== 'concluida') {
      await salvarOS({ ...os, status: 'concluida' }, id);
      if (currentView === 'tecnico') renderTecnicoView();
      alert('✅ OS finalizada!');
    }
  }

  // MODAIS
  function abrirFormCliente(id = null) {
    const edit = id !== null, cliente = edit ? clientes.find(c => c.id === id) : null;
    document.getElementById('modal-title').innerText = edit ? 'Editar Cliente' : 'Novo Cliente';
    document.getElementById('modal-body').innerHTML = `<form id="modalForm" class="space-y-4"><input name="nome" placeholder="Nome *" class="w-full p-3 border rounded-xl" value="${escapeHtml(cliente?.nome || '')}" required><input name="telefone" placeholder="Telefone" class="w-full p-3 border rounded-xl" value="${escapeHtml(cliente?.telefone || '')}"><textarea name="endereco" placeholder="Endereço" class="w-full p-3 border rounded-xl">${escapeHtml(cliente?.endereco || '')}</textarea><input name="plano" placeholder="Plano" class="w-full p-3 border rounded-xl" value="${escapeHtml(cliente?.plano || '')}"><input name="mac_roteador" placeholder="MAC" class="w-full p-3 border rounded-xl" value="${escapeHtml(cliente?.mac_roteador || '')}"><button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl">SALVAR</button></form>`;
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('modalForm').onsubmit = async (e) => {
      e.preventDefault();
      const dados = Object.fromEntries(new FormData(e.target));
      if (!dados.nome) return alert("Nome obrigatório");
      await salvarCliente(dados, id);
      window.fecharModal();
    };
  }
  function abrirFormTecnico(id = null) {
    const edit = id !== null, tecnico = edit ? tecnicos.find(t => t.id === id) : null;
    document.getElementById('modal-title').innerText = edit ? 'Editar Técnico' : 'Novo Técnico';
    document.getElementById('modal-body').innerHTML = `<form id="modalForm" class="space-y-4"><input name="nome" placeholder="Nome *" class="w-full p-3 border rounded-xl" value="${escapeHtml(tecnico?.nome || '')}" required><input name="telefone" placeholder="Telefone" class="w-full p-3 border rounded-xl" value="${escapeHtml(tecnico?.telefone || '')}"><input name="especialidade" placeholder="Especialidade" class="w-full p-3 border rounded-xl" value="${escapeHtml(tecnico?.especialidade || '')}"><button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl">SALVAR</button></form>`;
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('modalForm').onsubmit = async (e) => {
      e.preventDefault();
      const dados = Object.fromEntries(new FormData(e.target));
      if (!dados.nome) return alert("Nome obrigatório");
      await salvarTecnico(dados, id);
      window.fecharModal();
    };
  }
  function abrirFormOS(id = null) {
    const edit = id !== null, osEdit = edit ? ordens.find(o => o.id === id) : null;
    const clienteOpts = clientes.map(c => `<option value="${c.id}" ${osEdit && osEdit.cliente_id === c.id ? 'selected' : ''}>${escapeHtml(c.nome)}</option>`).join('');
    const tecnicoOpts = tecnicos.map(t => `<option value="${t.id}" ${osEdit && osEdit.tecnico_id === t.id ? 'selected' : ''}>${escapeHtml(t.nome)}</option>`).join('');
    document.getElementById('modal-title').innerText = edit ? 'Editar OS' : 'Nova OS';
    document.getElementById('modal-body').innerHTML = `<form id="modalForm" class="space-y-4"><select name="cliente_id" class="w-full p-3 border rounded-xl" required><option value="">Selecione</option>${clienteOpts}</select><select name="tecnico_id" class="w-full p-3 border rounded-xl" required><option value="">Selecione</option>${tecnicoOpts}</select><select name="tipo" class="w-full p-3 border rounded-xl"><option value="Manutenção" ${osEdit?.tipo === 'Manutenção' ? 'selected' : ''}>Manutenção</option><option value="Instalação" ${osEdit?.tipo === 'Instalação' ? 'selected' : ''}>Instalação</option></select><textarea name="problema" placeholder="Problema" class="w-full p-3 border rounded-xl">${escapeHtml(osEdit?.problema || '')}</textarea><select name="status" class="w-full p-3 border rounded-xl"><option value="aberta" ${osEdit?.status === 'aberta' ? 'selected' : ''}>Aberta</option><option value="em andamento" ${osEdit?.status === 'em andamento' ? 'selected' : ''}>Em andamento</option><option value="concluida" ${osEdit?.status === 'concluida' ? 'selected' : ''}>Concluída</option></select><button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl">SALVAR</button></form>`;
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('modalForm').onsubmit = async (e) => {
      e.preventDefault();
      const dados = Object.fromEntries(new FormData(e.target));
      if (!dados.cliente_id || !dados.tecnico_id) return alert("Selecione cliente e técnico");
      await salvarOS(dados, id);
      window.fecharModal();
    };
  }

  function abrirLoginTecnico() {
    if (!tecnicos.length) return alert("Nenhum técnico cadastrado.");
    const botoes = tecnicos.map(t => `<button onclick="window.selecionarTecnico(${t.id})" class="w-full text-left p-3 border rounded-xl hover:bg-blue-50 flex justify-between"><span>${escapeHtml(t.nome)} - ${escapeHtml(t.especialidade)}</span><i class="fas fa-arrow-right"></i></button>`).join('');
    document.getElementById('modal-title').innerText = "Selecione o Técnico";
    document.getElementById('modal-body').innerHTML = `<div class="space-y-2">${botoes}<button onclick="window.fecharModal()" class="w-full text-center text-slate-400 text-sm">Cancelar</button></div>`;
    document.getElementById('modal').classList.remove('hidden');
  }
  function selecionarTecnico(id) {
    tecnicoLogado = tecnicos.find(t => t.id === id);
    if (tecnicoLogado) { setView('tecnico'); window.fecharModal(); renderTecnicoView(); }
  }

  async function gerarPDFOrdens() {
    const filtered = ordens.filter(o => {
      const cli = clientes.find(c => c.id === o.cliente_id);
      const tec = tecnicos.find(t => t.id === o.tecnico_id);
      return (cli?.nome || '').toLowerCase().includes(searchTerm) || (tec?.nome || '').toLowerCase().includes(searchTerm);
    });
    if (!filtered.length) return alert("Nenhuma ordem");
    const body = filtered.map(o => {
      const cli = clientes.find(c => c.id === o.cliente_id);
      const tec = tecnicos.find(t => t.id === o.tecnico_id);
      return [o.id, cli?.nome || 'Removido', tec?.nome || 'N/A', o.tipo, o.problema, { aberta: 'Aberta', 'em andamento': 'Em andamento', concluida: 'Concluída' }[o.status]];
    });
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape' });
    doc.text("HDNet - Ordens de Serviço", 14, 20);
    doc.text(`Gerado em: ${new Date().toLocaleString()}`, 14, 28);
    doc.autoTable({ startY: 35, head: [['ID','Cliente','Técnico','Tipo','Problema','Status']], body });
    doc.save(`ordens_${Date.now()}.pdf`);
  }

  // NAVEGAÇÃO
  function setView(view) {
    currentView = view;
    document.getElementById('adminView').style.display = view === 'admin' ? 'block' : 'none';
    document.getElementById('tecnicoView').classList.toggle('hidden', view !== 'tecnico');
    document.getElementById('adminDashboard').style.display = view === 'admin' ? 'grid' : 'none';
    if (view === 'admin') renderAdminContent();
  }
  function setActiveTab(tab) { activeTab = tab; document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active')); document.getElementById(`tab-${tab}`).classList.add('tab-active'); renderAdminContent(); }
  function fecharModal() { document.getElementById('modal').classList.add('hidden'); }
  function escapeHtml(str) { return !str ? '' : String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  document.getElementById('searchInput').addEventListener('input', (e) => { searchTerm = e.target.value.toLowerCase(); if (currentView === 'admin') renderAdminContent(); });

  window.abrirFormCliente = abrirFormCliente;
  window.excluirCliente = excluirCliente;
  window.abrirFormTecnico = abrirFormTecnico;
  window.excluirTecnico = excluirTecnico;
  window.abrirFormOS = abrirFormOS;
  window.editarOS = abrirFormOS;
  window.excluirOS = excluirOS;
  window.concluirOS = concluirOS;
  window.finalizarOS = finalizarOS;
  window.fecharModal = fecharModal;
  window.setActiveTab = setActiveTab;
  window.setView = setView;
  window.abrirLoginTecnico = abrirLoginTecnico;
  window.selecionarTecnico = selecionarTecnico;
  window.gerarPDFOrdens = gerarPDFOrdens;

  carregarDados();
  setView('admin');
  setActiveTab('os');
</script>
</body>
</html>
